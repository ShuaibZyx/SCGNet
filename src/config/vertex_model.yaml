VertexModelConfig:
  _target_: src.model_config.VertexModelConfig
  experiment: Vertex-Full-TorchSparse-Tallinn
  # dataset
  dataset_path: /root/autodl-tmp/Tallinn_Filtered/Tallinn_Filtered_Polygon_Processed.pkl
  # /root/autodl-fs/datasets/Zurich_Filtered/Zurich_Filtered_Polygon_Processed.pkl
  # /root/autodl-tmp/Tallinn_Filtered/Tallinn_Filtered_Polygon_Processed.pkl
  batch_size: 16
  augmentation: True
  # transformer
  pooling: True # 显存不够(False)
  decoder_config: 
    {
      "hidden_size": 384, 
      "fc_size": 1024, 
      "num_layers": 18, 
      "dropout_rate": 0.2
    }
  quantization_bits: 8
  max_num_input_verts: 100
  # loss
  learning_rate: 3e-4
  warmup_steps: 10000
  epochs: 200
